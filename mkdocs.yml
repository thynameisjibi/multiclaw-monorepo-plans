site_name: Implementation Plans
site_description: MultiClaw Monorepo Implementation Plans
site_url: "https://multiplai-tech-v2.github.io/multiclaw-monorepo-plans/"
repo_url: "https://github.com/Multiplai-Tech-v2/multiclaw-monorepo-plans"
repo_name: "Multiplai-Tech-v2/multiclaw-monorepo-plans"

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Plans:
    - Issue #170 - Template Agents: plans/issue-170-plan.md

extra_css:
  - stylesheets/extra.css
